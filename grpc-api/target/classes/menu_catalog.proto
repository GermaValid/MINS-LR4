syntax = "proto3";

option java_multiple_files = true;
option java_package = "ru.bmstu.iu3.grpc.menu";
option java_outer_classname = "MenuCatalogProto";

package ru.bmstu.iu3.grpc.menu;

// Справочник меню (сервис B — Reference Service).
service MenuCatalog {
  rpc GetMenu (GetMenuRequest) returns (GetMenuResponse);
  rpc ValidateDishNumber (ValidateDishRequest) returns (ValidateDishResponse);
}

message GetMenuRequest {}

message DishItem {
  string name = 1;
  int32 price = 2;
  string description = 3;
}

message GetMenuResponse {
  repeated DishItem dishes = 1;
}

message ValidateDishRequest {
  int32 number = 1;
}

message ValidateDishResponse {
  bool valid = 1;
  string error_message = 2;
}
